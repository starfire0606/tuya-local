# Smart Light RGB48 - RGBIC outdoor string lights
# Product ID: 2znvfkx64d4fkzxp
# Protocol: 3.4
#
# Notes:
# - DP 20: on/off switch
# - DP 21: work mode. "colour" mode causes hs errors if selected directly — hidden.
#   Use "scene" mode with DP 56 or DP 59 for color control.
# - DP 22: brightness (10-1000)
# - DP 23: color temp (0-1000, mapped 2700K-6500K)
# - DP 26: countdown timer
# - DP 56 (rgbic_linerlight_scene): base64 scene payload. Accepts saved DIY scene
#   payloads from Smart Life app for animated multicolor scenes. Write-only in practice
#   (device does not report this DP in status polls). Use text.set_value to apply.
# - DP 58: LED count setting (1-5000)
# - DP 59 (draw_tool): base64 per-bulb paint protocol. Supports STATIC multicolor.
#   Payload format per bulb: [0x01, 0x02, effect, hue_hi, hue_lo, sat, 0x64, 0x00,
#   0x00, 0x81, 0x00, bulb_index]
#   effect: 0 = static, 1 = gradient
#   hue: 0-360 as 2-byte big-endian integer
#   sat: 0-100
#   bulb_index: 0-47 (for 48-bulb string)
#   Send init frame first: [0x01, 0x01, 0x00, 0x00, 0x00, 0x00, 0x64, 0x00, 0x00]
#   Then send one payload per bulb with ~50ms delay between each.
#   This is the same protocol used by the Smart Life draw tool (paint brush mode).
# - DP 101: segment mode selector (RGB / RGBIC / White / Scene)
#
# Known behavior:
# - DP 56 and DP 59 are write-only; the device never reports them in status polls.
# - Setting DP 21 to "colour" triggers repeated hs color mode errors — kept hidden.
# - Static per-segment color via DP 56 is NOT supported; all DP 56 scenes animate.
# - True static per-bulb multicolor requires DP 59 paint protocol (see above).
name: RGBIC string light
products:
  - id: 2znvfkx64d4fkzxp
    model: Smart Light RGB48
entities:
  - entity: light
    icon: "mdi:string-lights"
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        name: color_mode
        mapping:
          - dps_val: "white"
            value: "color_temp"
          - dps_val: "colour"
            value: "hs"
            hidden: true  # selecting this mode causes repeated hs color errors; no direct RGB dp
          - dps_val: "scene"
            value: "scene"
          - dps_val: "music"
            value: "music"
            hidden: true
      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500
  - entity: select
    name: Segment mode
    category: config
    icon: "mdi:led-strip-variant"
    dps:
      - id: 101
        type: string
        name: option
        mapping:
          - dps_val: "RGB"
            value: "RGB"
          - dps_val: "RGBIC"
            value: "RGBIC"
          - dps_val: "WHITE"
            value: "White"
          - dps_val: "SCENE"
            value: "Scene"
  - entity: number
    name: LED count
    category: config
    icon: "mdi:counter"
    dps:
      - id: 58
        type: integer
        name: value
        range:
          min: 1
          max: 5000
  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 26
        type: integer
        name: second
        optional: true
        range:
          min: 0
          max: 86399
        unit: s
  - entity: text
    translation_key: scene
    category: config
    dps:
      - id: 56
        type: base64
        name: value
        # Accepts animated multicolor scene payloads saved via Smart Life DIY scene editor.
        # Use text.set_value to apply. All DP 56 scenes animate — no static mode via this DP.
  - entity: text
    name: Draw tool
    category: config
    icon: "mdi:led-strip"
    dps:
      - id: 59
        type: base64
        name: value
        # Per-bulb paint protocol. Send init frame then one payload per bulb (0-47).
        # Supports effect=0 (static) for true static per-bulb multicolor.
        # See file header for full payload format documentation.
